<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nét Việt Travel | Quên mật khẩu</title>
  <meta name="description" content="Nhận liên kết đặt lại mật khẩu cho tài khoản Nét Việt Travel của bạn.">
  <link rel="stylesheet" href="index.css">
</head>
<body class="auth-page">
  <main class="auth-shell auth-shell--scenic">
    <div class="auth-shell__bg auth-shell__bg--scenic"></div>
    <section class="auth-shell__layout auth-plain-layout">
      <img class="auth-plain-brand" src="assets/logo.svg" alt="Nét Việt Travel">

      <div class="auth-plain-content">
        <h1 class="auth-plain-title">Quên mật khẩu</h1>
        <p class="auth-plain-subtitle">Nhập địa chỉ email đã đăng ký để nhận liên kết đặt lại mật khẩu.</p>

        <form class="auth-plain-form" action="login.html" method="get">
          <div class="auth-field-group">
            <label class="auth-label" for="forgot-email">Địa chỉ Email</label>
            <div class="auth-input-wrap auth-input-wrap--strong auth-input-wrap--action">
              <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                  <path d="M4 7l8 6 8-6"></path>
                </svg>
              </span>
              <input class="auth-input" id="forgot-email" name="email" type="email" placeholder="example@gmail.com">
              <a class="auth-input-action" href="#" id="btn-send-code">Gửi mã</a>
            </div>
          </div>

          <div class="auth-field-group">
            <label class="auth-label" for="forgot-code">Mã xác nhận</label>
            <div class="auth-input-wrap auth-input-wrap--strong">
              <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 12a8 8 0 11-2.34-5.66L20 4v6h-6l2.24-2.24A5.98 5.98 0 1018 12"></path>
                </svg>
              </span>
              <input class="auth-input" id="forgot-code" name="verificationCode" type="text" placeholder="1234">
            </div>
          </div>

          <div class="auth-field-group">
            <label class="auth-label" for="forgot-password">Mật khẩu mới</label>
            <div class="auth-input-wrap auth-input-wrap--strong">
              <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                  <path d="M8 11V8a4 4 0 118 0v3"></path>
                </svg>
              </span>
              <input class="auth-input" id="forgot-password" name="password" type="password" placeholder="••••••••">
              <span class="auth-input-toggle" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </span>
            </div>
          </div>

          <div class="auth-field-group">
            <label class="auth-label" for="forgot-password-confirm">Nhập lại mật khẩu mới</label>
            <div class="auth-input-wrap auth-input-wrap--strong">
              <span class="auth-input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                  <path d="M8 11V8a4 4 0 118 0v3"></path>
                </svg>
              </span>
              <input class="auth-input" id="forgot-password-confirm" name="passwordConfirm" type="password" placeholder="••••••••">
              <span class="auth-input-toggle" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </span>
            </div>
          </div>

          <div class="auth-consent">
            <input id="forgot-consent" type="checkbox">
            <label for="forgot-consent">Tôi đồng ý với <strong>Điều khoản &amp; Chính sách bảo mật</strong> của Nét Việt.</label>
          </div>

          <div class="auth-plain-actions">
            <button class="auth-button auth-button--primary" type="submit" id="btn-forgot-submit">Hoàn tất thay đổi</button>
            <a class="auth-button auth-button--ghost" href="login.html" id="btn-forgot-cancel">Huỷ bỏ</a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
